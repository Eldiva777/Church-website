kind = "web"
previewPath = "/"
title = "Church Website"
version = "1.0.0"
id = "artifacts/church-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19410

[services.development]
run = "pnpm --filter @workspace/church-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/church-site", "run", "build" ]
run = "pnpm --filter @workspace/church-site run start"

[services.env]
PORT = "19410"
